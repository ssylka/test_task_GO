# Поднимает всю систему одной командой: docker compose up --build
services:
  # База данных PostgreSQL.
  db:
    image: postgres:16-alpine
    # Все переменные берём из config.env (в том числе POSTGRES_* для образа).
    env_file:
      - config.env
    ports:
      # Слева — порт на твоём компьютере, справа — порт внутри контейнера.
      # Берём 5433, чтобы не конфликтовать с локально установленным PostgreSQL на 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # healthcheck нужен, чтобы приложение стартовало только после готовности базы.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 15

  # Наше приложение на Go.
  app:
    build: .
    env_file:
      - config.env
    environment:
      # Внутри docker-compose база доступна по имени сервиса "db".
      DB_HOST: db
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
